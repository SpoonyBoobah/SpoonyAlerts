<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Overlay</title>
    <style>
        @font-face {
            font-family: 'B612';
            src: local('B612'), local('B612-Regular');
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            position: relative;
            transform-origin: center center;
            scale: 0.6;
        }
        .container.ready {
            animation: printAndFade 8.5s ease forwards;
        }
        .image-container {
            position: relative;
            display: inline-block;
        }
        .alert-image {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .image-text {
            position: absolute;
            top: 36.5%;
            left: 60%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .date-text {
            position: absolute;
            top: 46.5%;
            left: 60%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .flight-text {
            position: absolute;
            top: 55.5%;
            left: 60%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .seat-text {
            position: absolute;
            top: 64.5%;
            left: 60%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .time-text {
            position: absolute;
            top: 74%;
            left: 60%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .date-text-small {
            position: absolute;
            top: 66%;
            left: 109%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .flight-text-small {
            position: absolute;
            top: 74%;
            left: 109%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .seat-text-small {
            position: absolute;
            top: 82%;
            left: 109%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .time-text-small {
            position: absolute;
            top: 90%;
            left: 109%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }

        @keyframes printAndFade {
            0%   { transform: translateX(110%); opacity: 1; }

            5%   { transform: translateX(88%);  opacity: 1; }
            7%   { transform: translateX(86%);  opacity: 1; }
            9%   { transform: translateX(84%);  opacity: 1; }
            11%  { transform: translateX(83%);  opacity: 1; }
            13%  { transform: translateX(82%);  opacity: 1; }

            23%  { transform: translateX(60%);  opacity: 1; }

            25%  { transform: translateX(58%);  opacity: 1; }
            27%  { transform: translateX(56%);  opacity: 1; }
            29%  { transform: translateX(55%);  opacity: 1; }
            31%  { transform: translateX(54%);  opacity: 1; }
            33%  { transform: translateX(52%);  opacity: 1; }

            40%  { transform: translateX(32%);  opacity: 1; }

            42%  { transform: translateX(30%);  opacity: 1; }
            44%  { transform: translateX(28%);  opacity: 1; }
            46%  { transform: translateX(26%);  opacity: 1; }
            48%  { transform: translateX(24%);  opacity: 1; }
            50%  { transform: translateX(22%);  opacity: 1; }

            56%  { transform: translateX(0%);   opacity: 1; }
            78%  { transform: translateX(0%);   opacity: 1; }
            100% { transform: translateX(0%);   opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="image-container">
            <img class="alert-image" id="alert-image" alt="Alert Image">
            <div class="image-text" id="image-text"></div>
            <div class="date-text" id="date-text"></div>
            <div class="date-text-small" id="date-text-small"></div>
            <div class="flight-text" id="flight-text"></div>
            <div class="flight-text-small" id="flight-text-small"></div>
            <div class="seat-text" id="seat-text"></div>
            <div class="seat-text-small" id="seat-text-small"></div>
            <div class="time-text" id="time-text"></div>
            <div class="time-text-small" id="time-text-small"></div>
        </div>
    </div>
    <script>
        window.onload = function () {
            const container = document.getElementById('container');
            const alertImage = document.getElementById('alert-image');

            const today = new Date();
            document.getElementById('date-text').textContent = today.toLocaleDateString('en-GB');
            document.getElementById('date-text-small').textContent = today.toLocaleDateString('en-GB');

            const rounded = new Date(Math.ceil(today.getTime() / (5 * 60 * 1000)) * (5 * 60 * 1000));
            document.getElementById('time-text').textContent = rounded.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('time-text-small').textContent = rounded.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });

            fetchText("imageText.txt", "image-text");


            const flightNumber = generateFlightNumber();
            const seatNumber = generateSeatNumber();

            document.getElementById('flight-text').textContent = flightNumber;
            document.getElementById('flight-text-small').textContent = flightNumber;

            document.getElementById('seat-text').textContent = seatNumber;
            document.getElementById('seat-text-small').textContent = seatNumber;


            

            fetch("alertImage.txt?nocache=" + Date.now())
                .then(response => {
                    if (!response.ok) throw new Error('Could not read alertImage.txt');
                    return response.text();
                })
                .then(data => {
                    const src = data.trim();

                    alertImage.onload = function () {
                        startAlert();
                    };

                    alertImage.onerror = function () {
                        console.error('Image failed to load:', src);
                        // do nothing — alert will not fire
                    };

                    alertImage.src = src;

                    if (alertImage.complete && alertImage.naturalWidth > 0) {
                        startAlert();
                    }
                })
                .catch(error => {
                    console.error('Error loading alertImage.txt:', error);
                    // do nothing — alert will not fire
                });

            function startAlert() {
                if (container.classList.contains('ready')) return;

                container.classList.add('ready');

                const audio = new Audio('kitchen_ticket_printer_sound.mp3');
                audio.volume = 0.0;
                audio.play().catch(error => {
                    console.error('Audio play failed:', error);
                });

                setTimeout(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }, 8500);
            }
        };

        function generateFlightNumber() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const getDigit = () => Math.floor(Math.random() * 10);
            const getLetter = () => letters.charAt(Math.floor(Math.random() * 26));

            const numDigits = Math.random() < 0.5 ? 2 : 3;
            let digits = '';
            for (let i = 0; i < numDigits; i++) {
                digits += getDigit();
            }

            const numLetters = Math.random() < 0.5 ? 1 : 2;
            let suffix = '';
            for (let i = 0; i < numLetters; i++) {
                suffix += getLetter();
            }

            return 'ATV' + digits + suffix;
        }

        function generateSeatNumber() {
            // Airbus A320 layout: rows 1-30, seats A-F
            // Row 1 is business/front, rows 2-30 economy
            // No row 13 on many airlines (superstition) — skipped here too
            const seatLetters = ['A', 'B', 'C', 'D', 'E', 'F'];

            let row;
            do {
                row = Math.floor(Math.random() * 30) + 1;
            } while (row === 13);

            const letter = seatLetters[Math.floor(Math.random() * seatLetters.length)];

            return row + letter;
        }

        function fetchText(fileName, elementId) {
            fetch(fileName + "?nocache=" + Date.now())
                .then(response => response.text())
                .then(data => {
                    document.getElementById(elementId).textContent = data.trim();
                })
                .catch(error => {
                    console.error('Error fetching file:', error);
                });
        }
    </script>
</body>
</html>
