<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpoonyAlerts OBS Overlay</title>
    <style>
        @font-face {
            font-family: 'B612';
            src: local('B612'), local('B612-Regular');
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            position: relative;
            transform-origin: center center;
            scale: 0.6;
        }
        .container.ready {
            animation: printAndFade 8.5s ease forwards;
        }
        .image-container {
            position: relative;
            display: inline-block;
        }
        .alert-image {
            display: block;
            max-width: 100%;
            height: auto;
        }

        /* ===================== FOLLOW / BOARDING PASS FIELDS ===================== */
        .follow-fields div {
            position: absolute;
            font-family: 'B612', B612, sans-serif;
            font-weight: bold;
            color: black;
            box-sizing: border-box;
            text-align: left;
        }
        .image-text  { top: 36.5%; left: 60%; transform: translate(-50%, -50%); font-size: 48px; width: 35%; }
        .date-text   { top: 46.5%; left: 60%; transform: translate(-50%, -50%); font-size: 48px; width: 35%; }
        .flight-text { top: 55.5%; left: 60%; transform: translate(-50%, -50%); font-size: 48px; width: 35%; }
        .seat-text   { top: 64.5%; left: 60%; transform: translate(-50%, -50%); font-size: 48px; width: 35%; }
        .time-text   { top: 74%;   left: 60%; transform: translate(-50%, -50%); font-size: 48px; width: 35%; }
        .date-text-small   { top: 66%; left: 109%; transform: translate(-50%, -50%); font-size: 24px; width: 35%; }
        .flight-text-small { top: 74%; left: 109%; transform: translate(-50%, -50%); font-size: 24px; width: 35%; }
        .seat-text-small   { top: 82%; left: 109%; transform: translate(-50%, -50%); font-size: 24px; width: 35%; }
        .time-text-small   { top: 90%; left: 109%; transform: translate(-50%, -50%); font-size: 24px; width: 35%; }

        /* ===================== SUB / MEMBER CARD FIELDS ===================== */
        .sub-fields div {
            position: absolute;
            font-family: 'B612', B612, sans-serif;
            font-weight: bold;
            color: white;
            box-sizing: border-box;
            text-align: left;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }
        .sub-username { top: 61%;  left: 20%; font-size: 36px; width: 47%; }
        .sub-duration { top: 77%; left: 20%; font-size: 36px; width: 47%; }

        /* ===================== VISIBILITY ===================== */
        .follow-fields, .sub-fields { display: none; }
        .follow-fields div, .sub-fields div { position: absolute; }

        /* ===================== ANIMATION — BOARDING PASS (right to centre) ===================== */
        @keyframes printAndFade {
            0%   { transform: translateX(200%); opacity: 1; }
            2%   { transform: translateX(183%); opacity: 1; }
            4%   { transform: translateX(166%); opacity: 1; }
            6%   { transform: translateX(149%); opacity: 1; }
            8%   { transform: translateX(132%); opacity: 1; }
            10%  { transform: translateX(115%); opacity: 1; }
            12%  { transform: translateX(95%);  opacity: 1; }
            14%  { transform: translateX(90%);  opacity: 1; }
            16%  { transform: translateX(86%);  opacity: 1; }
            18%  { transform: translateX(83%);  opacity: 1; }
            20%  { transform: translateX(81%);  opacity: 1; }
            22%  { transform: translateX(80%);  opacity: 1; }
            28%  { transform: translateX(50%);  opacity: 1; }
            30%  { transform: translateX(45%);  opacity: 1; }
            32%  { transform: translateX(41%);  opacity: 1; }
            34%  { transform: translateX(38%);  opacity: 1; }
            36%  { transform: translateX(36%);  opacity: 1; }
            38%  { transform: translateX(35%);  opacity: 1; }
            60%  { transform: translateX(0%);   opacity: 1; }
            78%  { transform: translateX(0%);   opacity: 1; }
            100% { transform: translateX(0%);   opacity: 0; }
        }

        /* ===================== ANIMATION — CARD SWIPE (top to centre, left, right, fade) ===================== */
        @keyframes cardSwipe {
            /* === ENTRY: card drops in from top === */
            0%   { transform: translateY(-200%); opacity: 1; }
            12%  { transform: translateY(0%);    opacity: 1; }

            /* === HOLD at centre === */
            22%  { transform: translateY(0%);    opacity: 1; }

            /* === SLIDE to left 1/3 === */
            32%  { transform: translateX(-67%);  opacity: 1; }

            /* === BRIEF PAUSE at left === */
            38%  { transform: translateX(-67%);  opacity: 1; }

            /* === SWIPE to right 2/3 === */
            52%  { transform: translateX(67%);   opacity: 1; }

            /* === BRIEF PAUSE at right === */
            62%  { transform: translateX(67%);   opacity: 1; }

            /* === FADE OUT === */
            100% { transform: translateX(67%);   opacity: 0; }
        }

        .container.ready-follow {
            animation: printAndFade 8.5s ease forwards;
        }
        .container.ready-sub {
            animation: cardSwipe 8.5s ease forwards;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="image-container">
            <img class="alert-image" id="alert-image" alt="" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">

            <!-- Follow / Boarding Pass fields -->
            <div class="follow-fields" id="follow-fields">
                <div class="image-text"        id="image-text"></div>
                <div class="date-text"         id="date-text"></div>
                <div class="flight-text"       id="flight-text"></div>
                <div class="seat-text"         id="seat-text"></div>
                <div class="time-text"         id="time-text"></div>
                <div class="date-text-small"   id="date-text-small"></div>
                <div class="flight-text-small" id="flight-text-small"></div>
                <div class="seat-text-small"   id="seat-text-small"></div>
                <div class="time-text-small"   id="time-text-small"></div>
            </div>

            <!-- Sub / Member Card fields -->
            <div class="sub-fields" id="sub-fields">
                <div class="sub-username" id="sub-username"></div>
                <div class="sub-duration" id="sub-duration"></div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function () {
            const container  = document.getElementById('container');
            const alertImage = document.getElementById('alert-image');

            let lastAlertSrc = null;

            function checkForAlert() {
                fetch("alertImage.txt?nocache=" + Date.now())
                    .then(r => { if (!r.ok) throw new Error('Cannot read alertImage.txt'); return r.text(); })
                    .then(data => {
                        const raw = data.trim();

                        // First load — set to empty so any trigger fires
                        if (lastAlertSrc === null) {
                            lastAlertSrc = '';
                            return;
                        }

                        // Only fire on change
                        if (raw === lastAlertSrc) return;
                        lastAlertSrc = raw;

                        // Parse pipe-separated format:
                        // follow|image.png|username|timestamp
                        // sub|image.png|username|duration
                        const parts  = raw.split('|');
                        const type   = parts[0].trim().toLowerCase();
                        let imgSrc = parts[1] ? parts[1].trim() : '';
                        const param1 = parts[2] ? parts[2].trim() : '';
                        const param2 = parts[3] ? parts[3].trim() : '';

                        // Hide both field sets, show the right one
                        document.getElementById('follow-fields').style.display = 'none';
                        document.getElementById('sub-fields').style.display    = 'none';

                        if (type === 'follow' || type.endsWith('_follow')) {
                            setupFollowAlert(param1);
                            document.getElementById('follow-fields').style.display = 'block';
                        } else if (type === 'sub' || type.endsWith('_sub') || type.endsWith('_member')) {
                            setupSubAlert(param1, param2);
                            document.getElementById('sub-fields').style.display = 'block';
                            // Override image based on cumulative months
                            const months = parseInt(param2) || 0;
                            if (months >= 36)      imgSrc = 'sub_diamond.png';
                            else if (months >= 24) imgSrc = 'sub_platinum.png';
                            else if (months >= 12) imgSrc = 'sub_gold.png';
                            else if (months >= 6)  imgSrc = 'sub_silver.png';
                            else if (months >= 3)  imgSrc = 'sub_bronze.png';
                            else                   imgSrc = 'sub.png';
                        }

                        // Reset animation
                        container.classList.remove('ready-follow', 'ready-sub');
                        void container.offsetWidth;

                        // Use imgSrc directly — same as original working version
                        alertImage.onload  = () => startAlert(type);
                        alertImage.onerror = () => console.error('Image failed to load:', imgSrc);
                        alertImage.src = imgSrc;

                        if (alertImage.complete && alertImage.naturalWidth > 0) {
                            startAlert(type);
                        }
                    })
                    .catch(e => console.error('Error loading alertImage.txt:', e));
            }

            function setupFollowAlert(username) {
                const today = new Date();
                document.getElementById('date-text').textContent       = today.toLocaleDateString('en-GB');
                document.getElementById('date-text-small').textContent = today.toLocaleDateString('en-GB');

                const rounded = new Date(Math.ceil(today.getTime() / (5 * 60 * 1000)) * (5 * 60 * 1000));
                const timeStr = rounded.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
                document.getElementById('time-text').textContent       = timeStr;
                document.getElementById('time-text-small').textContent = timeStr;

                document.getElementById('image-text').textContent = username || '';

                const flight = generateFlightNumber();
                const seat   = generateSeatNumber();
                document.getElementById('flight-text').textContent       = flight;
                document.getElementById('flight-text-small').textContent = flight;
                document.getElementById('seat-text').textContent         = seat;
                document.getElementById('seat-text-small').textContent   = seat;
            }

            function setupSubAlert(username, duration) {
                document.getElementById('sub-username').textContent = username || '';
                document.getElementById('sub-duration').textContent = duration || '';
            }

            function startAlert(type) {
                if (container.classList.contains('ready-follow') || container.classList.contains('ready-sub')) return;

                const isSub = (type === 'sub' || type.endsWith('_sub') || type.endsWith('_member'));
                container.classList.add(isSub ? 'ready-sub' : 'ready-follow');

                const soundFile = isSub ? 'Sub_alert.mp3' : 'come_fly_with_me.mp3';

                const audio = new Audio(soundFile);
                audio.volume = 1.0;
                audio.play().catch(e => console.error('Audio play failed:', e));

                setTimeout(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }, 8500);
            }

            // Poll every 2 seconds
            checkForAlert();
            setInterval(checkForAlert, 2000);
        };

        function generateFlightNumber() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const getDigit  = () => Math.floor(Math.random() * 10);
            const getLetter = () => letters.charAt(Math.floor(Math.random() * 26));
            const numDigits  = Math.random() < 0.5 ? 2 : 3;
            const numLetters = Math.random() < 0.5 ? 1 : 2;
            let digits = '', suffix = '';
            for (let i = 0; i < numDigits;  i++) digits  += getDigit();
            for (let i = 0; i < numLetters; i++) suffix  += getLetter();
            return 'ATV' + digits + suffix;
        }

        function generateSeatNumber() {
            const letters = ['A','B','C','D','E','F'];
            let row;
            do { row = Math.floor(Math.random() * 30) + 1; } while (row === 13);
            return row + letters[Math.floor(Math.random() * letters.length)];
        }
    </script>
</body>
</html>
