<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpoonyAlerts OBS Overlay</title>
    <style>
        @font-face {
            font-family: 'B612';
            src: local('B612'), local('B612-Regular');
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            position: relative;
            transform-origin: center center;
            scale: 0.6;
        }
        .container.ready {
            animation: printAndFade 8.5s ease forwards;
        }
        .image-container {
            position: relative;
            display: inline-block;
        }
        .alert-image {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .image-text {
            position: absolute;
            top: 36.5%;
            left: 60%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .date-text {
            position: absolute;
            top: 46.5%;
            left: 60%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .flight-text {
            position: absolute;
            top: 55.5%;
            left: 60%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .seat-text {
            position: absolute;
            top: 64.5%;
            left: 60%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .time-text {
            position: absolute;
            top: 74%;
            left: 60%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 48px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .date-text-small {
            position: absolute;
            top: 66%;
            left: 109%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .flight-text-small {
            position: absolute;
            top: 74%;
            left: 109%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .seat-text-small {
            position: absolute;
            top: 82%;
            left: 109%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }
        .time-text-small {
            position: absolute;
            top: 90%;
            left: 109%;
            transform: translate(-50%, -50%);
            font-family: 'B612', B612, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: black;
            width: 35%;
            text-align: left;
            box-sizing: border-box;
        }

        @keyframes printAndFade {
            /* === SMOOTH ENTRY: ticket slides in from off-screen right === */
            0%   { transform: translateX(200%); opacity: 1; }
            2%   { transform: translateX(183%); opacity: 1; }
            4%   { transform: translateX(166%); opacity: 1; }
            6%   { transform: translateX(149%); opacity: 1; }
            8%   { transform: translateX(132%); opacity: 1; }
            10%  { transform: translateX(115%); opacity: 1; }
            12%  { transform: translateX(95%);  opacity: 1; }

            /* === JUDDER 1: ticket catches/stutters while still mostly off-screen === */
            14%  { transform: translateX(90%);  opacity: 1; }
            16%  { transform: translateX(86%);  opacity: 1; }
            18%  { transform: translateX(83%);  opacity: 1; }
            20%  { transform: translateX(81%);  opacity: 1; }
            22%  { transform: translateX(80%);  opacity: 1; }

            /* === GAP: ticket jumps forward to start position of judder 2 === */
            28%  { transform: translateX(50%);  opacity: 1; }

            /* === JUDDER 2: ticket catches again, roughly half on screen === */
            30%  { transform: translateX(45%);  opacity: 1; }
            32%  { transform: translateX(41%);  opacity: 1; }
            34%  { transform: translateX(38%);  opacity: 1; }
            36%  { transform: translateX(36%);  opacity: 1; }
            38%  { transform: translateX(35%);  opacity: 1; }

            /* === SMOOTH SETTLE: ticket glides into final centered position === */
            60%  { transform: translateX(0%);   opacity: 1; }

            /* === HOLD: ticket stays visible === */
            78%  { transform: translateX(0%);   opacity: 1; }

            /* === FADE OUT: ticket disappears === */
            100% { transform: translateX(0%);   opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="image-container">
            <img class="alert-image" id="alert-image" alt="Alert Image">
            <div class="image-text" id="image-text"></div>
            <div class="date-text" id="date-text"></div>
            <div class="date-text-small" id="date-text-small"></div>
            <div class="flight-text" id="flight-text"></div>
            <div class="flight-text-small" id="flight-text-small"></div>
            <div class="seat-text" id="seat-text"></div>
            <div class="seat-text-small" id="seat-text-small"></div>
            <div class="time-text" id="time-text"></div>
            <div class="time-text-small" id="time-text-small"></div>
        </div>
    </div>
    <script>
        window.onload = function () {
            const container = document.getElementById('container');
            const alertImage = document.getElementById('alert-image');

            // Track the last known value of alertImage.txt — null means first load (don't fire)
            let lastAlertSrc = null;

            function checkForAlert() {
                fetch("alertImage.txt?nocache=" + Date.now())
                    .then(response => {
                        if (!response.ok) throw new Error('Could not read alertImage.txt');
                        return response.text();
                    })
                    .then(data => {
                        const src = data.trim();

                        // First load — just store the value silently, don't fire
                        if (lastAlertSrc === null) {
                            lastAlertSrc = src;
                            return;
                        }

                        // Only fire if the value has actually changed
                        if (src !== lastAlertSrc) {
                            lastAlertSrc = src;

                            const today = new Date();
                            document.getElementById('date-text').textContent = today.toLocaleDateString('en-GB');
                            document.getElementById('date-text-small').textContent = today.toLocaleDateString('en-GB');

                            const rounded = new Date(Math.ceil(today.getTime() / (5 * 60 * 1000)) * (5 * 60 * 1000));
                            document.getElementById('time-text').textContent = rounded.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
                            document.getElementById('time-text-small').textContent = rounded.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });

                            fetchText("imageText.txt", "image-text");

                            const flightNumber = generateFlightNumber();
                            const seatNumber = generateSeatNumber();

                            document.getElementById('flight-text').textContent = flightNumber;
                            document.getElementById('flight-text-small').textContent = flightNumber;

                            document.getElementById('seat-text').textContent = seatNumber;
                            document.getElementById('seat-text-small').textContent = seatNumber;

                            // Reset animation so it can fire again
                            container.classList.remove('ready');
                            void container.offsetWidth; // force reflow

                            alertImage.onload = function () {
                                startAlert();
                            };

                            alertImage.onerror = function () {
                                console.error('Image failed to load:', src);
                            };

                            alertImage.src = src;

                            if (alertImage.complete && alertImage.naturalWidth > 0) {
                                startAlert();
                            }
                        }
                    })
                    .catch(error => console.error('Error loading alertImage.txt:', error));
            }

            function startAlert() {
                if (container.classList.contains('ready')) return;

                container.classList.add('ready');

                const audio = new Audio('come_fly_with_me.mp3');
                audio.volume = 1.0;
                audio.play().catch(error => {
                    console.error('Audio play failed:', error);
                });

                setTimeout(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }, 8500);
            }

            // Poll every 2 seconds for changes to alertImage.txt
            checkForAlert();
            setInterval(checkForAlert, 2000);
        };

        function generateFlightNumber() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const getDigit = () => Math.floor(Math.random() * 10);
            const getLetter = () => letters.charAt(Math.floor(Math.random() * 26));

            const numDigits = Math.random() < 0.5 ? 2 : 3;
            let digits = '';
            for (let i = 0; i < numDigits; i++) {
                digits += getDigit();
            }

            const numLetters = Math.random() < 0.5 ? 1 : 2;
            let suffix = '';
            for (let i = 0; i < numLetters; i++) {
                suffix += getLetter();
            }

            return 'ATV' + digits + suffix;
        }

        function generateSeatNumber() {
            const seatLetters = ['A', 'B', 'C', 'D', 'E', 'F'];

            let row;
            do {
                row = Math.floor(Math.random() * 30) + 1;
            } while (row === 13);

            const letter = seatLetters[Math.floor(Math.random() * seatLetters.length)];

            return row + letter;
        }

        function fetchText(fileName, elementId) {
            fetch(fileName + "?nocache=" + Date.now())
                .then(response => response.text())
                .then(data => {
                    document.getElementById(elementId).textContent = data.trim();
                })
                .catch(error => {
                    console.error('Error fetching file:', error);
                });
        }
    </script>
</body>
</html>
